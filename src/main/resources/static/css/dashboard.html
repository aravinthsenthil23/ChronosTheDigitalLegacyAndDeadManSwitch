<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chronos Command Deck</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* --- 1. THEME VARIABLES --- */
        :root {
            --cyan: #00f3ff;
            --red: #ff0055;
            --dark: #050510;
            --glass: rgba(10, 10, 30, 0.85);
            --border: rgba(0, 243, 255, 0.3);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--dark);
            color: white;
            font-family: 'Rajdhani', sans-serif;
            height: 100vh;
            overflow: hidden;
            background-image:
                    radial-gradient(circle at 10% 20%, rgba(0, 243, 255, 0.05) 0%, transparent 20%),
                    radial-gradient(circle at 90% 80%, rgba(255, 0, 85, 0.05) 0%, transparent 20%);
        }

        /* --- 2. LAYOUT GRID --- */
        .dashboard-container {
            display: grid;
            grid-template-columns: 250px 1fr 350px; /* Sidebar, Main, Vault */
            grid-template-rows: 60px 1fr; /* Navbar, Content */
            height: 100vh;
            gap: 10px;
            padding: 10px;
        }

        /* --- 3. NAVBAR --- */
        .navbar {
            grid-column: 1 / -1;
            background: var(--glass);
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            border-radius: 5px;
        }

        .logo { font-family: 'Orbitron'; font-size: 1.5rem; color: var(--cyan); letter-spacing: 2px; }
        .user-badge { color: #aaa; font-size: 0.9rem; }
        .user-badge span { color: white; font-weight: bold; margin-left: 5px; }

        .btn-logout {
            background: transparent;
            border: 1px solid var(--red);
            color: var(--red);
            padding: 5px 15px;
            cursor: pointer;
            transition: 0.3s;
            font-family: 'Orbitron';
        }
        .btn-logout:hover { background: var(--red); color: white; box-shadow: 0 0 10px var(--red); }

        /* --- 4. LEFT SIDEBAR (Status) --- */
        .sidebar {
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 5px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* The Pulsing Heartbeat */
        .heartbeat-circle {
            width: 120px;
            height: 120px;
            border: 4px solid var(--cyan);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 20px var(--cyan);
            animation: pulse 2s infinite;
            margin-bottom: 20px;
        }

        .status-text {
            font-size: 1.5rem;
            font-weight: bold;
            font-family: 'Orbitron';
            color: var(--cyan);
        }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 10px var(--cyan); }
            50% { transform: scale(1.1); box-shadow: 0 0 30px var(--cyan); }
            100% { transform: scale(1); box-shadow: 0 0 10px var(--cyan); }
        }

        /* --- 5. CENTER PANEL (Timer & Actions) --- */
        .main-panel {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .timer-card {
            flex: 1;
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 5px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .timer-display {
            font-family: 'Orbitron';
            font-size: 4rem;
            color: white;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
        }

        .timer-label { color: #888; letter-spacing: 2px; margin-bottom: 10px; }

        .check-in-btn {
            margin-top: 30px;
            padding: 20px 50px;
            font-size: 1.5rem;
            background: rgba(0, 243, 255, 0.1);
            border: 2px solid var(--cyan);
            color: var(--cyan);
            font-family: 'Orbitron';
            cursor: pointer;
            transition: 0.3s;
            clip-path: polygon(10% 0, 100% 0, 100% 70%, 90% 100%, 0 100%, 0 30%);
        }

        .check-in-btn:hover {
            background: var(--cyan);
            color: #000;
            box-shadow: 0 0 50px var(--cyan);
            transform: scale(1.05);
        }

        /* --- 6. RIGHT PANEL (Vault) --- */
        .vault-panel {
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 5px;
            padding: 20px;
            display: flex;
            flex-direction: column;
        }

        .vault-header { font-family: 'Orbitron'; margin-bottom: 15px; border-bottom: 1px solid #333; padding-bottom: 10px; }

        .upload-zone {
            border: 2px dashed var(--border);
            padding: 20px;
            text-align: center;
            color: #888;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.3s;
            margin-bottom: 20px;
        }
        .upload-zone:hover { border-color: var(--cyan); color: white; background: rgba(0, 243, 255, 0.05); }

        .file-list {
            flex: 1;
            overflow-y: auto;
        }

        .file-item {
            background: rgba(255,255,255,0.03);
            margin-bottom: 10px;
            padding: 10px;
            border-left: 3px solid var(--cyan);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.9rem;
        }
        .file-item span { overflow: hidden; white-space: nowrap; text-overflow: ellipsis; max-width: 180px; }
        .download-icon { cursor: pointer; color: var(--cyan); }
        .download-icon:hover { text-shadow: 0 0 5px var(--cyan); }

        /* Scrollbar Styling */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: var(--cyan); }
        ::-webkit-scrollbar-track { background: #111; }

    </style>
</head>
<body>

<div class="dashboard-container">
    <nav class="navbar">
        <div class="logo">CHRONOS // CMD</div>
        <div class="user-badge">OPERATOR: <span id="userEmailDisplay">LOADING...</span></div>
        <button class="btn-logout" onclick="logout()">TERMINATE SESSION</button>
    </nav>

    <aside class="sidebar">
        <div class="heartbeat-circle">
            <svg width="50" height="50" viewBox="0 0 24 24" fill="var(--cyan)">
                <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
            </svg>
        </div>
        <div class="status-text">ALIVE</div>
        <div style="margin-top:10px; color:#666; font-size:0.8rem;">HEARTBEAT MONITOR ACTIVE</div>
    </aside>

    <main class="main-panel">
        <div class="timer-card">
            <div class="timer-label">TIME UNTIL RELEASE</div>
            <div class="timer-display" id="countdown">00:00:00:00</div>

            <button class="check-in-btn" id="btnCheckIn">I AM ALIVE</button>
            <div id="checkInStatus" style="margin-top: 15px; color: var(--cyan);"></div>
        </div>
    </main>

    <aside class="vault-panel">
        <div class="vault-header">ENCRYPTED VAULT</div>

        <div class="upload-zone" onclick="document.getElementById('fileInput').click()">
            <p>CLICK TO UPLOAD ARTIFACT</p>
            <input type="file" id="fileInput" style="display: none;" onchange="uploadFile()">
        </div>

        <div class="file-list" id="fileListContainer">
            <div style="text-align:center; color:#555; margin-top:50px;">Fetching Encrypted Data...</div>
        </div>
    </aside>
</div>
<script src="js/dashboard.js"></script>
</body>
</html>
