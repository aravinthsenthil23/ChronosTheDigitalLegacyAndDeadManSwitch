<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Legacy Access Protocol | CHRONOS</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* --- 1. THEME: LOCKDOWN --- */
        :root {
            --locked: #ff0040; /* Red for Locked */
            --unlocked: #00f3ff; /* Cyan for Unlocked */
            --bg: #030305;
            --terminal: #111;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg);
            color: var(--locked);
            font-family: 'Share Tech Mono', monospace;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* --- 2. BACKGROUND WARNING ANIMATION --- */
        .warning-bg {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: repeating-linear-gradient(
                    45deg,
                    rgba(255, 0, 64, 0.05),
                    rgba(255, 0, 64, 0.05) 10px,
                    rgba(0, 0, 0, 0.1) 10px,
                    rgba(0, 0, 0, 0.1) 20px
            );
            z-index: -1;
            animation: pan 20s linear infinite;
        }
        @keyframes pan { from { background-position: 0 0; } to { background-position: 100px 0; } }

        /* --- 3. THE VAULT CONTAINER --- */
        .vault-box {
            width: 600px;
            background: rgba(10, 10, 10, 0.9);
            border: 2px solid var(--locked);
            box-shadow: 0 0 30px rgba(255, 0, 64, 0.2);
            padding: 40px;
            position: relative;
            transition: 0.5s;
        }

        /* The "Caution" Tape Header */
        .vault-header {
            border-bottom: 2px dashed var(--locked);
            padding-bottom: 20px;
            margin-bottom: 30px;
            text-align: center;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 2rem;
            letter-spacing: 5px;
            text-transform: uppercase;
        }

        .status-badge {
            display: inline-block;
            background: var(--locked);
            color: black;
            padding: 5px 10px;
            font-weight: bold;
            margin-top: 10px;
            font-size: 0.8rem;
        }

        /* --- 4. INPUT SECTION --- */
        .input-zone {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        label { color: #666; font-size: 0.9rem; }

        .token-input {
            background: #000;
            border: 1px solid #333;
            color: var(--locked);
            padding: 15px;
            font-family: 'Share Tech Mono', monospace;
            font-size: 1.2rem;
            letter-spacing: 2px;
            outline: none;
            transition: 0.3s;
        }

        .token-input:focus {
            border-color: var(--locked);
            box-shadow: 0 0 15px rgba(255, 0, 64, 0.3);
        }

        .btn-access {
            background: transparent;
            border: 2px solid var(--locked);
            color: var(--locked);
            padding: 15px;
            font-family: 'Orbitron';
            font-size: 1.1rem;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
        }

        .btn-access:hover {
            background: var(--locked);
            color: black;
            box-shadow: 0 0 20px var(--locked);
        }

        /* --- 5. THE TERMINAL (For Decryption Animation) --- */
        .terminal-log {
            height: 0;
            overflow: hidden;
            background: #050505;
            color: var(--unlocked);
            font-size: 0.8rem;
            padding: 0;
            margin-top: 20px;
            border-left: 2px solid var(--unlocked);
            transition: 0.3s;
        }

        .log-line { margin-bottom: 5px; opacity: 0; animation: fadeIn 0.1s forwards; }
        @keyframes fadeIn { to { opacity: 1; } }

        /* --- 6. THE FILE REVEAL --- */
        .files-container {
            display: none; /* Hidden by default */
            margin-top: 30px;
        }

        .file-card {
            background: rgba(0, 243, 255, 0.05);
            border: 1px solid var(--unlocked);
            padding: 15px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            animation: slideDown 0.5s ease-out;
        }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

        .file-name { color: white; font-weight: bold; }
        .btn-download {
            background: var(--unlocked);
            color: black;
            border: none;
            padding: 5px 15px;
            cursor: pointer;
            font-weight: bold;
            text-decoration: none;
        }

        /* --- 7. STATE: UNLOCKED --- */
        /* This class is added via JS when token is correct */
        body.access-granted {
            --locked: #00f3ff; /* Everything turns Cyan */
        }
        body.access-granted .warning-bg { display: none; }
        body.access-granted .vault-box { border-color: var(--unlocked); box-shadow: 0 0 50px rgba(0, 243, 255, 0.2); }
        body.access-granted .status-badge { background: var(--unlocked); content: "ACCESS GRANTED"; }

    </style>
</head>
<body>

<div class="warning-bg"></div>

<div class="vault-box">
    <div class="vault-header">
        <h1>Restricted Access</h1>
        <div class="status-badge" id="statusBadge">VAULT LOCKED</div>
    </div>

    <div class="input-zone" id="inputZone">
        <label>ENTER 32-BIT RELEASE TOKEN:</label>
        <input type="text" class="token-input" id="tokenInput" placeholder="XXXX-XXXX-XXXX-XXXX" autocomplete="off">
        <button class="btn-access" onclick="initiateProtocol()">DECRYPT & ACCESS</button>
        <div id="errorMsg" style="color: var(--locked); margin-top: 10px; display: none;">INVALID TOKEN</div>
    </div>

    <div class="terminal-log" id="terminal">
    </div>

    <div class="files-container" id="fileList">
        <h3 style="color: white; margin-bottom: 15px; font-family: 'Orbitron';">LEGACY ARTIFACTS:</h3>
    </div>
</div>

<script>
    async function initiateProtocol() {
        const token = document.getElementById("tokenInput").value.trim();
        const btn = document.querySelector(".btn-access");
        const terminal = document.getElementById("terminal");
        const errorMsg = document.getElementById("errorMsg");

        // Reset UI
        errorMsg.style.display = "none";
        terminal.innerHTML = "";
        terminal.style.height = "150px";
        terminal.style.padding = "15px";

        if(!token) return;

        // 1. ANIMATION: Fake Hacking Sequence
        const logs = [
            "Establishing secure handshake...",
            "Verifying SHA-256 signature...",
            "Retrieving Dead Man's Key...",
            "Bypassing firewall...",
            "Decrypting BLOB data...",
            "ACCESS GRANTED."
        ];

        btn.disabled = true;
        btn.style.opacity = "0.5";
        btn.innerText = "PROCESSING...";

        // Play the log animation
        for (let i = 0; i < logs.length; i++) {
            await new Promise(r => setTimeout(r, 400)); // Delay
            const p = document.createElement("div");
            p.className = "log-line";
            p.innerText = "> " + logs[i];
            terminal.appendChild(p);
            terminal.scrollTop = terminal.scrollHeight;
        }

        // 2. REAL BACKEND CALL
        // Note: You need to create this simple GET endpoint in your VaultController
        // @GetMapping("/nominee-files") public List<VaultFile> getFiles(@RequestParam String token)

        try {
            // Simulating a backend call for the demo.
            // In real code: fetch(`/api/vault/nominee-files?token=${token}`)

            // --- MOCK LOGIC START (Replace with real Fetch) ---
            const isTokenValid = (token.length > 5); // Simple mock check

            if (isTokenValid) {
                await new Promise(r => setTimeout(r, 800)); // Suspense delay
                unlockVault();
            } else {
                throw new Error("Invalid Token");
            }
            // --- MOCK LOGIC END ---

        } catch (e) {
            terminal.innerHTML += `<div style="color: red; margin-top: 10px;">> CRITICAL ERROR: TOKEN MISMATCH</div>`;
            errorMsg.style.display = "block";
            btn.disabled = false;
            btn.style.opacity = "1";
            btn.innerText = "RETRY";
        }
    }

    function unlockVault() {
        // 1. Switch Theme to Blue/Cyan
        document.body.classList.add("access-granted");
        document.getElementById("statusBadge").innerText = "ACCESS GRANTED";
        document.getElementById("statusBadge").style.background = "#00f3ff";

        // 2. Hide Input, Show Files
        document.getElementById("inputZone").style.display = "none";
        document.getElementById("terminal").style.display = "none";
        const fileContainer = document.getElementById("fileList");
        fileContainer.style.display = "block";

        // 3. Inject Fake Files (Replace this with real JSON data from API)
        const mockFiles = [
            { name: "Last_Will_and_Testament.pdf", id: 101 },
            { name: "Crypto_Wallet_Keys.txt", id: 102 },
            { name: "Confession_Video.mp4", id: 103 }
        ];

        mockFiles.forEach(file => {
            const card = document.createElement("div");
            card.className = "file-card";
            card.innerHTML = `
                    <span class="file-name">${file.name}</span>
                    <button class="btn-download" onclick="downloadFile(${file.id})">DOWNLOAD</button>
                `;
            fileContainer.appendChild(card);
        });
    }

    function downloadFile(id) {
        alert("Initiating secure download for File ID: " + id);
        // In real code: window.location.href = `/api/vault/download/${id}?token=${token}`
    }
</script>
</body>
</html>
