<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chronos Access Terminal</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* --- 1. THE DARK THEME --- */
        :root {
            --primary: #00f3ff;
            --alert: #ff0055;
            --bg: #050510;
        }

        body {
            background-color: var(--bg);
            color: white;
            font-family: 'Rajdhani', sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            margin: 0;
        }

        /* --- 2. THE SCANNER BACKGROUND --- */
        .scan-grid {
            position: absolute;
            width: 200%;
            height: 200%;
            background-image:
                    linear-gradient(var(--bg) 2px, transparent 2px),
                    linear-gradient(90deg, var(--bg) 2px, transparent 2px);
            background-size: 50px 50px;
            background-color: rgba(0, 243, 255, 0.05);
            transform: perspective(500px) rotateX(60deg) translateY(-100px) translateZ(-200px);
            animation: gridMove 20s linear infinite;
            z-index: -1;
        }

        @keyframes gridMove {
            0% { background-position: 0 0; }
            100% { background-position: 0 100px; }
        }

        /* --- 3. THE LOGIN CARD (Glassmorphism) --- */
        .login-box {
            position: relative;
            width: 400px;
            padding: 40px;
            background: rgba(10, 10, 25, 0.8);
            border: 1px solid var(--primary);
            box-shadow: 0 0 20px rgba(0, 243, 255, 0.2);
            backdrop-filter: blur(10px);
            text-align: center;
            overflow: hidden;
        }

        /* The moving scanner line */
        .scanner-line {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 5px;
            background: var(--primary);
            box-shadow: 0 0 15px var(--primary);
            opacity: 0.5;
            animation: scan 3s ease-in-out infinite;
            pointer-events: none;
        }

        @keyframes scan {
            0% { top: 0%; opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { top: 100%; opacity: 0; }
        }

        h2 {
            font-family: 'Orbitron', sans-serif;
            color: var(--primary);
            letter-spacing: 2px;
            margin-bottom: 30px;
            text-shadow: 0 0 10px var(--primary);
        }

        /* --- 4. INPUT FIELDS --- */
        .input-group {
            position: relative;
            margin-bottom: 25px;
        }

        input {
            width: 100%;
            padding: 10px 0;
            font-size: 1.2rem;
            color: #fff;
            background: transparent;
            border: none;
            border-bottom: 1px solid #555;
            outline: none;
            font-family: 'Rajdhani', sans-serif;
            transition: 0.3s;
        }

        input:focus {
            border-bottom: 1px solid var(--primary);
            box-shadow: 0 5px 10px -10px var(--primary);
        }

        label {
            position: absolute;
            top: 10px; left: 0;
            color: #888;
            pointer-events: none;
            transition: 0.3s;
        }

        /* Label floats up when input is focused */
        input:focus ~ label, input:valid ~ label {
            top: -15px;
            font-size: 0.9rem;
            color: var(--primary);
        }

        /* --- 5. THE BUTTON --- */
        button {
            width: 100%;
            padding: 15px;
            margin-top: 20px;
            background: transparent;
            border: 2px solid var(--primary);
            color: var(--primary);
            font-family: 'Orbitron', sans-serif;
            font-size: 1.1rem;
            cursor: pointer;
            transition: 0.3s;
            position: relative;
            overflow: hidden;
        }

        button:hover {
            background: var(--primary);
            color: #000;
            box-shadow: 0 0 20px var(--primary);
        }

        /* --- 6. ERROR & SUCCESS STATES --- */
        .status-msg {
            margin-top: 15px;
            font-size: 0.9rem;
            min-height: 20px;
        }
        .error { color: var(--alert); text-shadow: 0 0 5px var(--alert); }
        .success { color: var(--primary); text-shadow: 0 0 5px var(--primary); }

        .links { margin-top: 20px; font-size: 0.9rem; }
        .links a { color: #888; text-decoration: none; transition: 0.3s; }
        .links a:hover { color: var(--primary); }

    </style>
</head>
<body>

<div class="scan-grid"></div>

<div class="login-box" id="loginCard">
    <div class="scanner-line"></div>

    <h2>IDENTITY VERIFY</h2>

    <form id="loginForm">
        <div class="input-group">
            <input type="email" id="loginEmail" required autocomplete="off">
            <label>User ID (Email)</label>
        </div>

        <div class="input-group">
            <input type="password" id="loginPass" required>
            <label>Access Key (Password)</label>
        </div>

        <button type="submit" id="btnSubmit">INITIATE SEQUENCE</button>
        <div class="status-msg" id="statusText"></div>
    </form>

    <div class="links">
        <a href="signup.html">Request New Vault Access</a> |
        <a href="index.html">Abort</a>
    </div>
</div>
<script src="js/auth.js"></script>

</body>
</html>
