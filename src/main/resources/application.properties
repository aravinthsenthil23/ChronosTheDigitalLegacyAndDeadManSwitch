# ==============================================================
# 1. DATABASE CONFIGURATION (MySQL)
# ==============================================================

# OPTION A: If using Google Cloud SQL Proxy (as discussed)
# spring.datasource.url=jdbc:mysql://127.0.0.1:3307/chronos_db?useSSL=false&allowPublicKeyRetrieval=true

# OPTION B: If using Standard Local MySQL (XAMPP / Workbench)
spring.datasource.url=jdbc:mysql://localhost:3306/chronos_db?useSSL=false&allowPublicKeyRetrieval=true

# Your Database Credentials
spring.datasource.username=root
spring.datasource.password=011005

# Hibernate Settings (The ORM Engine)
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
# 'update' keeps your data safe. 'create' deletes everything on restart.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

